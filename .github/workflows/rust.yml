name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: cargo test (${{ matrix.os }}, ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: [stable, "1.85"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --lib --tests
      - run: cargo test --lib --tests --no-default-features --features frame -p lz4rip
      - run: cargo test --lib --tests --features paranoid -p lz4rip
      - run: cargo test --lib --tests --no-default-features --features "frame,paranoid" -p lz4rip
      - run: cargo check --no-default-features -p lz4rip-encode
      - run: cargo check --no-default-features -p lz4rip-decode
      - run: cargo check --no-default-features -p lz4rip
      - run: cargo check --no-default-features --features paranoid -p lz4rip
      - run: cargo check --no-default-features --features paranoid -p lz4rip-encode

  nightly:
    name: nightly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo +nightly test --features nightly

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo +nightly fmt --all -- --check
      - run: cargo +nightly clippy --lib --tests
      - run: cargo +nightly clippy --lib --tests --features paranoid
      - run: cargo +nightly clippy --no-default-features --features paranoid -p lz4rip

  ci-success:
    name: CI success
    needs: [test, nightly, lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: check all jobs passed
        run: |
          if [[ '${{ toJSON(needs.*.result) }}' =~ (failure|cancelled) ]]; then
            exit 1
          fi
