  <text x="220.0" y="38" text-anchor="middle" fill="#7d8590" font-size="10">Intel Core i7-8700B @ 3.20GHz, performance governor, turbo off</text>
  <line x1="70" y1="190.4" x2="370" y2="190.4" stroke="#21262d" stroke-width="1"/>
