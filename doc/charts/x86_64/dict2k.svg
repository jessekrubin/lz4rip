  <rect x="115.0" y="125.5" width="90.0" height="9.2" fill="#4680c4" rx="2"/>
  <rect x="115.0" y="77.8" width="90.0" height="47.6" fill="#60a5fa" rx="2"/>
  <text x="160.0" y="71.8" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="600">3698 ns</text>
  <rect x="235.0" y="154.0" width="90.0" height="76.0" fill="#f87171" rx="2"/>
