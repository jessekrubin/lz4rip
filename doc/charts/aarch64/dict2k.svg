<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" font-family="system-ui, -apple-system, sans-serif">
  <rect width="400" height="340" fill="#0d1117"/>
  <text x="220.0" y="22" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">LZ4 + Dict (2 KB): 1 KB JSON (lower is better)</text>
  <text x="220.0" y="38" text-anchor="middle" fill="#7d8590" font-size="10">Apple M4</text>
  <line x1="70" y1="173.4" x2="370" y2="173.4" stroke="#21262d" stroke-width="1"/>
  <text x="62" y="173.4" text-anchor="end" dominant-baseline="middle" fill="#7d8590" font-size="10">0.5</text>
  <line x1="70" y1="116.8" x2="370" y2="116.8" stroke="#21262d" stroke-width="1"/>
  <text x="62" y="116.8" text-anchor="end" dominant-baseline="middle" fill="#7d8590" font-size="10">1.0</text>
  <line x1="70" y1="60.1" x2="370" y2="60.1" stroke="#21262d" stroke-width="1"/>
  <text x="62" y="60.1" text-anchor="end" dominant-baseline="middle" fill="#7d8590" font-size="10">1.5</text>
  <line x1="70" y1="230" x2="370" y2="230" stroke="#30363d" stroke-width="1.5"/>
  <text x="22" y="142.5" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600" transform="rotate(-90,22,142.5)">seconds / GB</text>
  <rect x="115.0" y="138.7" width="90.0" height="91.3" fill="#60a5fa" rx="2"/>
  <rect x="115.0" y="112.4" width="90.0" height="26.3" fill="#4680c4" rx="2"/>
  <rect x="115.0" y="77.8" width="90.0" height="34.6" fill="#60a5fa" rx="2"/>
  <text x="160.0" y="71.8" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="600">1138 ns</text>
  <rect x="235.0" y="159.7" width="90.0" height="70.3" fill="#f87171" rx="2"/>
  <rect x="235.0" y="133.4" width="90.0" height="26.3" fill="#c45050" rx="2"/>
  <rect x="235.0" y="101.9" width="90.0" height="31.5" fill="#f87171" rx="2"/>
  <text x="280.0" y="95.9" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="600">920 ns</text>
  <text x="160.0" y="246" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="600">lz4 (C)</text>
  <text x="280.0" y="246" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="600">lz4rip (encapsulated unsafe, Rust)</text>
  <text x="70" y="287" fill="#e6edf3" font-size="9">bright = compress + decompress</text>
  <text x="240" y="287" fill="#7d8590" font-size="9">dim = transfer @1 GB/s</text>
  <text x="220.0" y="330" text-anchor="middle" fill="#484f58" font-size="9">1 KB JSON message, dict trained on 2000 messages</text>
</svg>
