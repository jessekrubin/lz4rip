
[package]
name = "lz4rip-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition = "2018"

[package.metadata]
cargo-fuzz = true

[dependencies]
arbitrary = { version = "1", features = ["derive"] }
libfuzzer-sys = "0.4"
lzzzz = "0.8"

lz4rip = { path = "..", default-features = false, features=["frame"] }

# Prevent this from interfering with workspaces
[workspace]
members = ["."]

[[bin]]
name = "fuzz_roundtrip"
path = "fuzz_targets/fuzz_roundtrip.rs"
test = false
doc = false

[[bin]]
name = "fuzz_roundtrip_frame"
path = "fuzz_targets/fuzz_roundtrip_frame.rs"
test = false
doc = false

